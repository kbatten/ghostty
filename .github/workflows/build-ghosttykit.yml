name: Build GhosttyKit

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pkg/**'
      - 'vendor/**'
      - 'build.zig'
      - 'build.zig.zon'
      - 'build.zig.zon.json'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build xcframework
        run: zig build -Doptimize=ReleaseFast -Demit-xcframework=true -Dxcframework-target=universal -Demit-macos-app=false -Demit-themes=true

      - name: Compress xcframework
        run: |
          cd macos
          tar czf GhosttyKit.xcframework.tar.gz GhosttyKit.xcframework/

      # Bundle the terminfo DB + themes + shell-integration scripts so Macterm
      # can ship them in its own app bundle and resolve TERM=xterm-ghostty,
      # named themes, and shell integration without a separate Ghostty.app
      # install. The xcframework build installs themes/shell-integration to
      # zig-out/share/ghostty (-Demit-themes=true) and the compiled terminfo
      # tree to zig-out/share/terminfo (always built via `tic`). Stage all three
      # at the tarball's top level so Macterm extracts them straight into its
      # Resources dir and can point TERMINFO at terminfo/. Omitting terminfo
      # breaks key input + TERM (see macterm issues #39/#40). Use -p/--copy so
      # the terminfo symlinks (xterm-ghostty.tic aliases) survive.
      - name: Compress resources
        run: |
          mkdir -p resources-stage
          cp -R zig-out/share/ghostty/themes resources-stage/
          cp -R zig-out/share/ghostty/shell-integration resources-stage/
          cp -R zig-out/share/terminfo resources-stage/
          tar czf ghostty-resources.tar.gz -C resources-stage .

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_DATE: ${{ github.run_id }}
        run: |
          TAG="build-$(date -u +%Y-%m-%d)"
          COMMIT=$(git rev-parse --short HEAD)

          if gh release view "$TAG" &> /dev/null; then
            gh release delete "$TAG" --yes
            git push --delete origin "$TAG" 2>/dev/null || true
          fi

          gh release create "$TAG" \
            --title "GhosttyKit $(date -u +%Y-%m-%d)" \
            --latest \
            --notes "Built from commit ${COMMIT} on $(date -u +%Y-%m-%d)" \
            macos/GhosttyKit.xcframework.tar.gz \
            ghostty-resources.tar.gz
